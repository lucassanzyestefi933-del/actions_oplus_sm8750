name: Check Preinstalled Packages

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check preinstalled packages
        run: |
          echo "=== Installed / Missing ==="
          for pkg in \
            binutils \
            python-is-python3 \
            libssl-dev \
            libelf-dev \
            aria2 \
            dos2unix \
            cmake \
            gcc \
            make \
            zip \
            unzip \
            wget \
            curl \
            git \
            bc \
            bison \
            flex \
            rsync \
            cpio \
            kmod \
            pahole; do
            dpkg -l "$pkg" 2>/dev/null | grep -q "^ii" \
              && echo "  INSTALLED  $pkg" \
              || echo "  MISSING    $pkg"
          done

      - name: Show installed versions
        run: |
          echo "=== Versions of key tools ==="
          gcc --version | head -1      || echo "gcc: missing"
          python3 --version            || echo "python3: missing"
          git --version                || echo "git: missing"
          curl --version | head -1     || echo "curl: missing"
          aria2c --version | head -1   || echo "aria2: missing"
          dos2unix --version 2>&1 | head -1 || echo "dos2unix: missing"
          pahole --version 2>&1        || echo "pahole: missing"

      - name: Show runner disk and RAM
        run: |
          echo "=== Disk ==="
          df -h
          echo "=== RAM ==="
          free -h
          echo "=== CPU ==="
          nproc
          lscpu | grep -E "Model name|CPU\(s\)|Thread"
          echo "=== OS ==="
          lsb_release -a 2>/dev/null
